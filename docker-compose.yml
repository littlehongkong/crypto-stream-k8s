# docker-compose.yml

version: '3.8'

networks:
  crypto-network:
    driver: bridge

volumes:
  checkpoint_data:
  kafka_data:

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Xms256M -Xmx256M"
    ports:
      - "2181:2181"
    networks:
      - crypto-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_HEAP_OPTS: "-Xms512M -Xmx512M"
    networks:
      - crypto-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - crypto-network

  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: producer
    networks:
      - crypto-network
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SYMBOLS: btcusdt,ethusdt
    restart: on-failure

  spark-ohlcv:
    build:
      context: ./spark
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: spark-ohlcv
    networks:
      - crypto-network
    depends_on:
      - kafka
    volumes:
      - checkpoint_data:/tmp/spark-checkpoint
      - ./spark:/app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: crypto-trades
      CHECKPOINT_DIR: /tmp/spark-checkpoint


  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"    # API 포트 (Spark 연동용)
      - "9001:9001"    # 웹 UI 포트 (로그인 확인용)
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    networks:
      - crypto-network

  # MinIO 버킷을 자동으로 만들어주는 가벼운 서비스
  mc:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 admin password123) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc mb myminio/crypto-raw;
      /usr/bin/mc mb myminio/crypto-processed;
      exit 0;
      "
    networks:
      - crypto-network